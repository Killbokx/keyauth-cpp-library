name: sync-example

on:
  push:
    branches: [ main ]

jobs:
  trigger-example-ci:
    runs-on: ubuntu-latest
    steps:
      - name: dispatch example workflow
        env:
          EXAMPLE_REPO: ELF-Nigel/KeyAuth-CPP-Example
          EXAMPLE_TOKEN: ${{ secrets.EXAMPLE_REPO_TOKEN }}
        run: |
          if [ -z "$EXAMPLE_TOKEN" ]; then
            echo "EXAMPLE_REPO_TOKEN is not set" >&2
            exit 1
          fi
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $EXAMPLE_TOKEN" \
            https://api.github.com/repos/$EXAMPLE_REPO/dispatches \
            -d '{"event_type":"sync-library"}'
